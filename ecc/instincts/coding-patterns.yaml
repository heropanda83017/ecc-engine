factor: coding-patterns
last_updated: '2026-06-17'
description: 编码模式本能 — 记录什么编码实践有效、什么导致 bug
observations:
- pattern: atomic-write
  description: 文件写入必须 .tmp → os.replace
  benefit: 防止写入中断导致文件损坏
  discovered: 2026-06-06
  trigger: V4 Pro review P0-2 (instinct I/O race condition)
  fix_effort_hours: 0.5
  confidence: 0.95
  frequency: always
- pattern: is-not-none
  description: 检查权重等数值字段必须用 `is not None` 而非 `and`
  benefit: 防止 0.0 被 falsy 吞掉
  discovered: 2026-06-06
  trigger: V4 Pro review P2 (falsy 0.0 weight)
  fix_effort_hours: 0.1
  confidence: 0.9
  frequency: always
- pattern: re-read-before-patch
  description: 每次 patch 前确认当前文件状态，防止嵌套函数/截断
  benefit: 避免累积式嵌套 bug
  discovered: 2026-06-06
  trigger: save_instincts 函数嵌套 + factor_scout.py 截断事故
  fix_effort_hours: 0.3
  confidence: 0.85
  frequency: always
- pattern: signal-timeout
  description: 外部资源调用必须设超时 (signal.alarm 或 timeout kwarg)
  benefit: 防止 baostock 挂死阻塞管线
  discovered: 2026-06-06
  trigger: V4 Pro review P0-3 (baostock leak)
  fix_effort_hours: 0.3
  confidence: 0.88
  frequency: always
