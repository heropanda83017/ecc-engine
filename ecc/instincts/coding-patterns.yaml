rationalizations:
- reason: 这很简单，我不需要规格
  rebuttal: 简单任务不需要长规格，但仍需要验收标准。两行规格比没有好。
  when_to_apply: 小改动/单行修复
  discovered: 2026-06-12
  source: addyosmani/agent-skills
- reason: 我会在写完代码后再写规格
  rebuttal: 那是文档，不是规格。规格的价值在于编码前强制澄清。
  when_to_apply: 任何代码改动前
  discovered: 2026-06-12
  source: addyosmani/agent-skills
- reason: 规格会拖慢我们
  rebuttal: 15分钟规格防止数小时返工。15分钟瀑布式规划胜过15小时调试。
  when_to_apply: 新项目/功能/重大改动前
  discovered: 2026-06-12
  source: addyosmani/agent-skills
- reason: 需求反正会改变
  rebuttal: 正因如此规格是活的。过时的规格仍然优于没有规格。
  when_to_apply: 需求可能变化的任何时候
  discovered: 2026-06-12
  source: addyosmani/agent-skills
- reason: 用户知道他们想要什么
  rebuttal: 即使明确的请求也有隐含假设。规格表面化这些假设。
  when_to_apply: 用户提需求时
  discovered: 2026-06-12
  source: addyosmani/agent-skills
- reason: 我会边做边想
  rebuttal: 这就是做出乱码的原因。10分钟规划省小时。
  when_to_apply: 任何非平凡任务前
  discovered: 2026-06-12
  source: addyosmani/agent-skills
- reason: 任务太明显，写下来是开销
  rebuttal: 写下来显式化隐藏依赖和被遗忘的边界情况。
  when_to_apply: 有规格但需要拆解任务时
  discovered: 2026-06-12
  source: addyosmani/agent-skills
- reason: 我能全部记在脑子里
  rebuttal: 上下文窗口是有限的。书面计划跨会话边界和压缩。
  when_to_apply: 复杂/多步骤任务
  discovered: 2026-06-12
  source: addyosmani/agent-skills
